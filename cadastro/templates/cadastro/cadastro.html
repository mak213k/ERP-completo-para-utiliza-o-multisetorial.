<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="{% url 'cadastro' %}">Sistema Logístico</a>
        <div class="navbar-nav">
            <a class="nav-link active" href="{% url 'cadastro' %}">Novo Cliente</a>
            <a class="nav-link" href="{% url 'gerar_entrega' %}">Nova Entrega</a>
            <a class="nav-link" href="{% url 'lista_entregas' %}">Relatório</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card shadow p-4">
        <h4 class="mb-4">Cadastro de Cliente</h4>
        <form method="post">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mb-3"><label>Nome</label>{{ form.nome }}</div>
                <div class="col-md-3 mb-3"><label>CPF</label>{{ form.cpf }}</div>
                <div class="col-md-3 mb-3"><label>CNPJ</label>{{ form.cnpj }}</div>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3"><label>E-mail</label>{{ form.email }}</div>
                <div class="col-md-4 mb-3"><label>Celular</label>{{ form.celular }}</div>
                <div class="col-md-4 mb-3"><label>CEP</label>{{ form.cep }}</div>
            </div>
            <div class="row">
                <div class="col-md-10 mb-3"><label>Endereço</label>{{ form.endereco }}</div>
                <div class="col-md-2 mb-3"><label>Nº</label>{{ form.numero }}</div>
            </div>
            <div class="row">
                <div class="col-md-5 mb-3"><label>Bairro</label>{{ form.bairro }}</div>
                <div class="col-md-5 mb-3"><label>Cidade</label>{{ form.cidade }}</div>
                <div class="col-md-2 mb-3"><label>UF</label>{{ form.uf }}</div>
            </div>
            <button type="submit" class="btn btn-primary w-100">Salvar Cliente</button>
        </form>
    </div>
</div>
</body>
</html>
